[build]
  command = "npm install"

# Edge Functions 配置 - 支持流式输出
[[edge_functions]]
  path = "/v1/models"
  function = "api"

[[edge_functions]]
  path = "/v1/chat/completions"
  function = "api"

[[edge_functions]]
  path = "/*"
  function = "api"

# 保留传统 Functions 作为备用
[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/v1/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
